services:
  # ── FastAPI Backend ──
  - type: web
    name: civicfix-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: civicfix-db
          property: connectionString
      - key: CORS_ORIGINS
        # Update this after Vercel deploy gives you the actual URL
        value: https://civicfix.vercel.app,http://localhost:5173,http://localhost:3000
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard if desired
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: SECRET_KEY
        generateValue: true

databases:
  # ── PostgreSQL (free for 90 days) ──
  - name: civicfix-db
    plan: free
    databaseName: civicfix
    user: civicfix
